# TODO (Task 4)
# Define a docker-compose.yml that runs the FastAPI service with:
# 1. Build section that defines how to create the Docker image for the service
# 2. Port mapping 8000:8000
# 3. Pass environment variables using the .env file
# 4. Volume mounts for mlruns/ and mlartifacts/ so the API can reach the registered model
# 5. A healthcheck on GET /health
# 6. extra_hosts mapping so the container can reach the MLflow server running on the host machine
#    (required on Linux where host.docker.internal is not resolved automatically)
# Documentation: https://docs.docker.com/compose/compose-file/

version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./mlruns:/workspace/mlruns
      - ./mlartifacts:/workspace/mlartifacts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3