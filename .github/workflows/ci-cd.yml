# TODO (Task 5)
# Complete this CI/CD pipeline by implementing the following jobs:
# 1. test          — install dependencies and run pytest tests/ with MODEL_SOURCE=huggingface
# 2. deepchecks    — install dependencies and run scripts/run_deepchecks.py with MODEL_SOURCE=huggingface
#                    Both jobs must run in parallel after lint (needs: lint)
# 3. build-and-push — build the Docker image, tag it with the commit SHA, log in to Amazon ECR,
#                    and push both the SHA and latest tags (needs: test, deepchecks)
# 4. deploy        — render the ECS task definition with the new image and deploy to ECS Fargate
# Documentation: https://docs.github.com/en/actions/writing-workflows

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install flake8
      - run: flake8 app/ scripts/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          MODEL_SOURCE: huggingface
        run: pytest tests/

  deepchecks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Deepchecks
        env:
          MODEL_SOURCE: huggingface
        run: python scripts/run_deepchecks.py

  build:
    needs: [test, deepchecks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: finbert-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push -a $ECR_REGISTRY/$ECR_REPOSITORY

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}   # <--- ADD THIS LINE HERE!
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition finbert-api --query taskDefinition > task-definition.json

      - name: Render Amazon ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: finbert-api
          image: ${{ secrets.ECR_REGISTRY }}/finbert-api:${{ github.sha }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2   # <--- CHANGE THIS FROM @v1 to @v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: finbert-api-service
          cluster: finbert-cluster
          wait-for-service-stability: true
